name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  JOB_NAME: receipt-ocr-job
  REPOSITORY: receipt-ocr
  JOB_SERVICE_ACCOUNT: receipt-ocr@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: pytest --cov=src --cov-report=term-missing -v

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

      - name: Build and push
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${JOB_NAME}"
          docker build -t "${IMG}:${GITHUB_SHA::7}" -t "${IMG}:latest" .
          docker push "${IMG}:${GITHUB_SHA::7}"
          docker push "${IMG}:latest"

      - name: Deploy
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${JOB_NAME}:${GITHUB_SHA::7}"
          CMD="update"
          gcloud run jobs describe ${JOB_NAME} --region=${REGION} > /dev/null 2>&1 || CMD="create"
          gcloud run jobs ${CMD} ${JOB_NAME} \
            --region=${REGION} \
            --image="${IMG}" \
            --service-account="${JOB_SERVICE_ACCOUNT}" \
            --set-env-vars="\
          MASTER_SPREADSHEET_ID=${{ secrets.MASTER_SPREADSHEET_ID }},\
          INDIVIDUAL_TEMPLATE_SPREADSHEET_ID=${{ secrets.INDIVIDUAL_TEMPLATE_SPREADSHEET_ID }},\
          CORPORATE_TEMPLATE_SPREADSHEET_ID=${{ secrets.CORPORATE_TEMPLATE_SPREADSHEET_ID }},\
          CASHBOOK_OUTPUT_FOLDER_ID=${{ secrets.CASHBOOK_OUTPUT_FOLDER_ID }}" \
            --set-secrets="GEMINI_API_KEY=gemini-api-key:latest" \
            --max-retries=1 --task-timeout=600s --memory=512Mi
